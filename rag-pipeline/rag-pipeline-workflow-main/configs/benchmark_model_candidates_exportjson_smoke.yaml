benchmark_id: benchmark_model_candidates_exportjson_smoke
description: Smoke benchmark for Nexteye ESG package v1.1.1 on dev split only.
lane: company_export_json_dev
eval_set_path: .rag/rag-pipeline-practice/eval_set_company_export_json_dev_ko.md
corpus_version: company_export_json_v1_1_1_smoke
parser_version: jsonl_v1
cache_root: artifacts/benchmark_cache

lane_config:
  corpus_ratio: 1.0
  company_filter: 넥스트아이_dataset_package_20260528T091409
  pdf_parser: pypdf
  eval_questions: 5
  chunking_profile: recursive_800_120
  chunk_size: 800
  chunk_overlap: 120
  top_k: 4

timeouts:
  default_sec: 1200
  embedding_heavy_sec: 2400

scoring:
  retrieval_hit_rate: 0.30
  citation_correctness: 0.20
  answer_correctness: 0.15
  insufficient_information_handling: 0.10
  groundedness: 0.10
  latency_normalized: 0.10
  stability_penalty: 0.05

candidates:
  - config_id: smoke_nexteye_minilm_dense_chroma
    embedding_model: sentence-transformers/all-MiniLM-L6-v2
    retrieval_mode: semantic_dense
    reranker: none
    vector_store: chroma
    candidate_pool: 24
    timeout_sec: 1200

  - config_id: smoke_nexteye_minilm_hybrid_chroma
    embedding_model: sentence-transformers/all-MiniLM-L6-v2
    retrieval_mode: hybrid_dense_bm25
    reranker: none
    vector_store: chroma
    candidate_pool: 24
    timeout_sec: 1200
