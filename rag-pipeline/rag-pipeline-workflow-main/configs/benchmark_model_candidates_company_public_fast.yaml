# Fast lane: ~2-3h total (1 ingest BGE + eval ngan), khong lap 3 lan timeout.
benchmark_id: benchmark_model_candidates_company_public_fast
description: Fast model candidate subset after overnight waste analysis.
lane: company_public_dev
eval_set_path: .rag/rag-pipeline-practice/eval_set_company_public_dev.md
corpus_version: company_public_v1
parser_version: v1
cache_root: artifacts/benchmark_cache

lane_config:
  corpus_ratio: 1.0
  eval_questions: 30
  chunking_profile: recursive_800_120
  chunk_size: 800
  chunk_overlap: 120
  top_k: 4

timeouts:
  default_sec: 7200
  embedding_heavy_sec: 14400

scoring:
  retrieval_hit_rate: 0.30
  citation_correctness: 0.20
  answer_correctness: 0.15
  insufficient_information_handling: 0.10
  groundedness: 0.10
  latency_normalized: 0.10
  stability_penalty: 0.05

candidates:
  - config_id: minilm_hybrid_none
    embedding_model: sentence-transformers/all-MiniLM-L6-v2
    retrieval_mode: hybrid_dense_bm25
    reranker: none
    vector_store: chroma
    candidate_pool: 24
    timeout_sec: 3600

  - config_id: bge_m3_hybrid_none
    embedding_model: BAAI/bge-m3
    retrieval_mode: hybrid_dense_bm25
    reranker: none
    vector_store: chroma
    candidate_pool: 24
    timeout_sec: 14400
    embedding_heavy: true

  - config_id: multilingual_e5_dense_none
    embedding_model: intfloat/multilingual-e5-base
    retrieval_mode: semantic_dense
    reranker: none
    vector_store: chroma
    candidate_pool: 24
    timeout_sec: 14400
    embedding_heavy: true
