# LangGraph Evidence API — staging stack (handoff 3 công ty 2026-06-05)

# musinsa | rayshion | hanssem — xem docs/LANGGRAPH_API_HANDOFF.md



api_id: langgraph_staging_v2

mode: langgraph_staging

status: active

description: >

  Retrieval-only API. Hybrid dense/BM25 + Qdrant + OpenAI embed + Jina rerank (jina-reranker-v3).

  Registry MVP: musinsa, hanssem, rtx (06_rtx_references_raw); rayshion legacy cache.



cache_root: artifacts/benchmark_cache



stack:

  lane: company_export_json_full

  company_filter: ""

  corpus_version: langgraph_staging_20260608

  parser_version: jsonl_v1

  corpus_ratio: 1.0

  chunking_profile: section_based

  chunk_size: 800

  chunk_overlap: 120

  embedding_model: openai:text-embedding-3-small

  openai_embed_batch: 32

  retrieval_mode: hybrid_dense_bm25_rerank

  reranker: jina_api

  reranker_backend: jina_api

  reranker_model: jina-reranker-v3

  jina_rerank_max_docs: 16

  jina_max_chars: 400

  jina_min_interval_sec: 2

  jina_max_retries: 3

  rerank_blend_alpha: 0.40

  vector_store: qdrant

  candidate_pool: 64

  top_k: 8

  benchmark_language: ko



