benchmark_id: benchmark_model_candidates_hyundai_phase3_qdrant
description: Phase 3 rerank and Qdrant checks on Hyundai-only company public lane.
lane: company_public_dev
eval_set_path: .rag/rag-pipeline-practice/eval_set_company_public_hyundai.md
corpus_version: hyundai_public_v1
parser_version: pypdf_v1
cache_root: artifacts/benchmark_cache

lane_config:
  corpus_ratio: 1.0
  company_filter: hyundai_motor
  pdf_parser: pypdf
  eval_questions: 24
  chunking_profile: recursive_800_120
  chunk_size: 800
  chunk_overlap: 120
  top_k: 4

timeouts:
  default_sec: 3600
  embedding_heavy_sec: 10800

scoring:
  retrieval_hit_rate: 0.30
  citation_correctness: 0.20
  answer_correctness: 0.15
  insufficient_information_handling: 0.10
  groundedness: 0.10
  latency_normalized: 0.10
  stability_penalty: 0.05

candidates:
  - config_id: hyundai_bge_m3_hybrid_rerank_chroma
    embedding_model: BAAI/bge-m3
    retrieval_mode: hybrid_dense_bm25_rerank
    reranker: bge_reranker_or_flashrank
    reranker_model: BAAI/bge-reranker-base
    vector_store: chroma
    candidate_pool: 64
    timeout_sec: 10800
    embedding_heavy: true

  - config_id: hyundai_multilingual_e5_hybrid_rerank_chroma
    embedding_model: intfloat/multilingual-e5-base
    retrieval_mode: hybrid_dense_bm25_rerank
    reranker: bge_reranker_or_flashrank
    reranker_model: BAAI/bge-reranker-base
    vector_store: chroma
    candidate_pool: 64
    timeout_sec: 10800
    embedding_heavy: true

  - config_id: hyundai_bge_m3_hybrid_none_qdrant
    embedding_model: BAAI/bge-m3
    retrieval_mode: hybrid_dense_bm25
    reranker: none
    vector_store: qdrant
    candidate_pool: 24
    timeout_sec: 10800
    embedding_heavy: true

  - config_id: hyundai_multilingual_e5_hybrid_none_qdrant
    embedding_model: intfloat/multilingual-e5-base
    retrieval_mode: hybrid_dense_bm25
    reranker: none
    vector_store: qdrant
    candidate_pool: 24
    timeout_sec: 10800
    embedding_heavy: true
