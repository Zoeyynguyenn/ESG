# Production stack — frozen 2026-06-10 (Jina Rerank API v3)
# Gate 한샘 10 cau: jina hit/cit 1.0, composite 0.755 (none 0.805; chenh latency).

production_id: e2e_openai_hybrid_qdrant_jina
frozen_at: "2026-06-10"
status: frozen
supersedes: configs/production_openai_hybrid_qdrant_generative.yaml
gate_benchmark: configs/benchmark_exportjson_openai_flashrank_gate.yaml
description: >
  OpenAI + hybrid_dense_bm25_rerank + Qdrant + Jina API (jina-reranker-v3) + gpt-4o-mini.
  Prefilter 16 doc, 400 chars/doc, blend_alpha 0.40 — tranh Jina token rate limit.
cache_root: artifacts/benchmark_cache

stack:
  lane: company_export_json_full
  company_filter: 넥스트아이_dataset_package_20260528T091409
  corpus_version: nexteye_esg_v1_1_1_openai_full_e2e
  parser_version: jsonl_v1
  corpus_ratio: 1.0
  chunking_profile: section_based
  chunk_size: 800
  chunk_overlap: 120
  embedding_model: openai:text-embedding-3-small
  openai_embed_batch: 32
  retrieval_mode: hybrid_dense_bm25_rerank
  reranker: jina_api
  reranker_backend: jina_api
  reranker_model: jina-reranker-v3
  jina_rerank_max_docs: 16
  jina_max_chars: 400
  jina_min_interval_sec: 2
  jina_max_retries: 3
  rerank_blend_alpha: 0.40
  vector_store: qdrant
  candidate_pool: 64
  top_k: 4
  benchmark_language: ko
  answer_mode: generative
  llm_provider: openai_api
  llm_model: gpt-4o-mini

eval:
  full_set_path: .rag/rag-pipeline-practice/eval_set_company_export_json_dev_ko.md
  smoke_set_path: .rag/rag-pipeline-practice/eval_set_company_export_json_smoke_ci_ko.md

smoke_ci:
  question_ids:
    - CE-J02
    - CE-J03
    - CE-J06
    - CE-J07
    - CE-J16
  per_question:
    CE-J02:
      require: [retrieval_hit, citation_correct]
    CE-J03:
      require: [retrieval_hit, citation_correct, answer_correct]
    CE-J06:
      require: [retrieval_hit, citation_correct]
      waive_answer: true
      note: "J06 generative follow-up ticket P1-J06"
    CE-J07:
      require: [retrieval_hit, citation_correct, answer_correct]
    CE-J16:
      require: [insufficient_ok]

monitoring:
  thresholds:
    retrieval_hit_rate_min: 1.0
    citation_correctness_min: 1.0
    insufficient_smoke_min: 1.0
    answer_correctness_min: 0.6
    answer_correctness_waived_ids:
      - CE-J06
    query_time_avg_max_sec: 10.0
  alert_on_regression:
    - retrieval_hit_rate
    - citation_correctness
    - insufficient_smoke_min

baseline_reference:
  gate: benchmark_exportjson_openai_rerank_gate
  report: reports/benchmark_exportjson_openai_rerank_gate_summary.md
