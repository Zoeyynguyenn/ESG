[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers
markers =
    ollama: tests requiring Ollama to be running (deselect with -m "not ollama")

# Output
addopts =
    -v
    --tb=short
    --no-header
    -m "not ollama"
    --cov=rag_engine
    --cov=rag_chat
    --cov-report=term-missing
    --cov-report=html:coverage_html
    --cov-config=.coveragerc
